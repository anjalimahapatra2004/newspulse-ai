<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — NewsPulse AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <span class="pulse-mark"><span></span><span></span><span></span><span></span></span>
      NewsPulse AI
    </div>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <form id="forgot-form" novalidate>
      <div class="field" id="forgot-email-field">
        <label for="forgot-email">Email</label>
        <input type="email" id="forgot-email" required placeholder="you@example.com">
        <p class="error-text"></p>
      </div>
      <button type="submit" class="btn-primary" id="forgot-submit">
        <span class="spinner"></span>
        <span class="btn-label">Send reset link</span>
      </button>
    </form>

    <p class="auth-foot"><a href="login.html">Back to log in</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
