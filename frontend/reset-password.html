<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set new password — NewsPulse AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/theme.js"></script>
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">
      <span class="pulse-mark"><span></span><span></span><span></span><span></span></span>
      NewsPulse AI
    </div>
    <p class="subtitle">Choose a new password for your account.</p>

    <form id="reset-form" novalidate>
      <div class="field" id="reset-password-field">
        <label for="reset-password">New password</label>
        <div class="password-wrapper">
          <input type="password" id="reset-password" required placeholder="At least 8 characters">
          <button type="button" class="toggle-password" data-target="reset-password" aria-label="Show password"></button>
        </div>
        <p class="error-text"></p>
      </div>
      <button type="submit" class="btn-primary" id="reset-submit">
        <span class="spinner"></span>
        <span class="btn-label">Update password</span>
      </button>
    </form>

    <p class="auth-foot"><a href="login.html">Back to log in</a></p>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
